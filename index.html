<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>BMI Calculator</h1>
        <form>
            <p><label for="height">Height in CM: <input type="text" id="height"></label></p>
            <p><label for="weight">Weight in KG: <input type="text" id="weight"></label></p>
            <button>Calculator</button>
            <div id="results"></div>
            <div id="message"></div>
            <div id="weight-guide">
                <h2>BMI Weight Guide</h2>
                <p>Under Weight = Less than 18.6</p>
                <p>Normal Weight = 18.6 to 24.9</p>
                <p>Over Weight = Greater than 24.9</p>
            </div>
        </form>
    </div>

</body>
<script src="script.js"></script>

</html>
